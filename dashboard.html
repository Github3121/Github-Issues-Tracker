<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Github Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body oncopy="return false" oncut="return false" onpaste="return false">
    <header>
        <div class="navbar bg-base-100 shadow-sm px-4 md:px-10">
            <div class="flex-1">
            <a class="flex items-center gap-2 text-lg font-semibold">
                <img class="w-8" src="./assets/github-logo.png" />
                <span class="hidden sm:inline">Github Issues Tracker</span>
            </a>
            </div>
            <div class="flex items-center gap-3">
            <div class="flex items-center border border-[#E4E4E7] rounded px-3 py-2 w-[140px] sm:w-[200px] md:w-[260px]">
                <i class="fa-brands fa-sistrix text-[#64748B] text-sm"></i>
                <input id="searchInput" type="text" placeholder="Search..." class="border-0 ml-2 w-full outline-none text-sm text-[#64748B] placeholder:text-[#64748B]"/>
            </div>
            <button class="btn bg-[#4A00FF] text-white px-3 md:px-4 text-sm md:text-base">
                <i class="fa-solid fa-plus"></i>
                <span class="hidden sm:inline">New Issue</span>
            </button>
            </div>
        </div>
    </header>
    <section class="flex justify-start items-center w-3/4 mx-auto mt-[60px] p-6 shadow-sm rounded-[8px]">
        <div id="buttonUpdate" class="flex gap-2 flex-wrap md:justify-start items-center justify-center">
        </div>
    </section>
    <section class="w-11/12 md:w-3/4 mx-auto mt-4 p-4 md:p-6 shadow-sm rounded-t-[8px]">
        <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
            <div class="flex flex-col sm:flex-row items-center sm:items-start gap-3 text-center sm:text-left">
            <div class="w-[50px] h-[50px] bg-[#ECE4FF] p-[9px] rounded-full flex items-center justify-center">
                <img src="./assets/Aperture.png" alt="">
            </div>
            <div>
                <h1 class="text-lg md:text-xl font-semibold">
                <span id="countIssus">0</span> Issues
                </h1>
                <p class="text-sm text-[#64748B]">
                Track and manage your project issues
                </p>
            </div>
            </div>
            <div class="flex justify-center md:justify-end items-center gap-4 text-sm">
            <div class="flex items-center gap-1">
                <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                <span>Open</span>
            </div>
            <div class="flex items-center gap-1">
                <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                <span>Closed</span>
            </div>
            </div>
        </div>
    </section>
    <section style="border-radius: 0 0 8px 8px; border-top: 1px solid #E4E4E7;" class="flex justify-between items-center w-3/4 mx-auto p-6 shadow-sm bg-[#FBFBFB]">
        <div id="display" class="grid md:grid-cols-4 grid-cols-1 gap-3">
        </div>
    </section>
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box">
        <div id="displayModal"></div>
        <div class="modal-action">
        <form method="dialog">
            <button class="btn button-active">Close</button>
        </form>
        </div>
    </div>
    </dialog>
    <script src="./scripts/dashboard-script.js"></script>
</body>
</html>
