<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Github Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <a class="md:flex md:flex-row md:justify-start md:items-center gap-2 text-center md:ml-20 flex flex-col justify-start items-center"><img class="w-9" src="./assets/github-logo.png"> Github Issues Tracker</a>
            </div>
            <div class="flex md:flex-row flex-col-reverse md:justify-center justify-end items-center gap-4 md:mr-20">
                <div class="flex justify-center items-center text-center border-1 border-[#E4E4E7] rounded-[4px] py-[7px] px-4 gap-1">
                    <i class="fa-brands fa-sistrix" style="font-size: 16px; color: #64748B;"></i><input type="text" placeholder="Search issues..." class="outline-0 border-0 text-[#64748B] placeholder:text-[#64748B]" />
                </div>
                <button class="btn bg-[#4A00FF] text-white"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </header>
    <!-- Hero Section -->
    <section class="flex justify-start items-center w-3/4 mx-auto mt-[60px] p-6 shadow-sm rounded-[8px]">
        <div class="flex gap-2 flex-wrap md:justify-start items-center justify-center">
            <button onclick="loadAllData()" class="btn btn-outline btn-primary button-size sm:w-[auto] button-active">All</button>
            <button class="btn btn-outline btn-primary button-size button-unactive">Open</button>
            <button class="btn btn-outline btn-primary button-size sm:w-[auto] button-unactive">Closed</button>
        </div>
    </section>
    <!-- status / Guide -->
    <section class="flex justify-between items-center w-3/4 mx-auto mt-4 p-6 shadow-sm rounded-[8px]">
        <div class="flex justify-between items-center w-[100%]">
            <div class="flex md:flex-row flex-col justify-start items-center gap-2">
                <div class="w-[50px] h-[50px] bg-[#ECE4FF] p-[9px] rounded-[50px]"><img src="./assets/Aperture.png" alt=""></div>
                <div class="flex flex-col justify-start items-center relative">
                    <h1 class="text-start text-5 font-semibold"><span id="countIssus"></span> Issues</h1>
                    <p class="text-4 text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-green-500" style="border-radius: 10px;"></div>Open <div class="w-3 h-3 bg-purple-500" style="border-radius: 10px;"></div>Closed
            </div>
        </div>
    </section>
    <script src="./scripts/script.js"></script>
</body>
</html>
